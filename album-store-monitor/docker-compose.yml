version: "3.9"

# Album Store Monitoring Stack
# Runs on a single t3.micro EC2 instance (~$0.01/hr)
# Scrapes: ElastiCache Redis, RDS PostgreSQL, AWS CloudWatch (ALB, EC2, S3)
#
# Usage:
#   cp .env.example .env && vim .env     # fill in endpoints
#   docker compose up -d
#   open http://<EC2-IP>:3000            # Grafana (admin/admin)

services:

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"         # allows POST /-/reload
    ports:
      - "9090:9090"
    networks: [monitor]

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/album-store-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [monitor]

  # ── Redis Exporter → ElastiCache ───────────────────────────────────────────
  # Exposes all Redis INFO stats as Prometheus metrics.
  #
  # Key metrics for album store:
  #   redis_keyspace_hits_total   — cache GETs that found the key (album cache, photo status)
  #   redis_keyspace_misses_total — cache GETs that missed → fell through to DB
  #   redis_commands_processed_total — total INCR + GET + SET + DEL calls
  #   redis_connected_clients     — active connections from all 4 nodes
  #   redis_memory_used_bytes     — memory holding album cache + photo status + seq counters
  #   redis_db_keys               — total keys (seq counters + album cache + photo status entries)
  #   redis_expired_keys_total    — photo status entries that expired after 1-hour TTL
  #
  # Hit rate = hits / (hits + misses) — reflects how effectively we serve from cache
  # vs round-tripping to RDS. High miss rate during bursts is expected (cold cache).
  redis_exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://${REDIS_ADDR}"
      # Export specific key patterns so we can count seq keys and photo status keys
      REDIS_EXPORTER_CHECK_KEY_GROUPS: "album:*:seq,album:*,photo:*"
    ports:
      - "9121:9121"
    networks: [monitor]

  # ── PostgreSQL Exporter → RDS ──────────────────────────────────────────────
  # v0.16+ required for PostgreSQL 17 (pg_stat_bgwriter columns renamed in PG17)
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${POSTGRES_DSN}"
    command:
      - "--no-collector.stat_bgwriter"
    ports:
      - "9187:9187"
    networks: [monitor]

  # ── CloudWatch Exporter (YACE) → ALB · EC2 · S3 ───────────────────────────
  # yet-another-cloudwatch-exporter pulls CloudWatch metrics via AWS API.
  # Needs the EC2 instance's IAM role to have CloudWatch:GetMetricData access
  # (LabInstanceProfile already includes this in the Vocareum lab).
  yace:
    image: ghcr.io/nerdswords/yet-another-cloudwatch-exporter:v0.61.2
    container_name: yace
    restart: unless-stopped
    environment:
      AWS_REGION: "${AWS_REGION:-us-west-2}"
    volumes:
      - ./prometheus/cloudwatch.yml:/tmp/config.yml:ro
    command: ["--config.file=/tmp/config.yml"]
    ports:
      - "5000:5000"
    networks: [monitor]

  # ── Kafka — single-broker KRaft (apache/kafka official image) ─────────────
  # Using apache/kafka:3.8.1 (Apache's official image, reliable Docker Hub pull).
  # Single broker on t3.micro to fit within 1 GB RAM alongside other services.
  # Analytics/alert connect internally via kafka:9092.
  # Album store nodes connect externally via MONITOR_HOST:9094.
  # For production: scale to 3 brokers; the same producer/consumer model applies.
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://${MONITOR_HOST:-localhost}:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9094:9094"   # album store nodes publish here
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [monitor]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 6

  # kafka-init: creates topics after broker is ready
  kafka-init:
    image: apache/kafka:3.8.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic album-metrics --partitions 6 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic album-analytics-output --partitions 3 --replication-factor 1
      echo 'Topics ready:'
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
      "
    networks: [monitor]

  # ── S3 Exporter — real-time object count + size (CloudWatch S3 metrics are daily) ──
  s3-exporter:
    build:
      context: ./services/s3-exporter
      dockerfile: Dockerfile
    image: album-s3-exporter:latest
    container_name: s3-exporter
    restart: unless-stopped
    environment:
      S3_BUCKET: "${S3_BUCKET}"
      AWS_REGION: "${AWS_REGION:-us-west-2}"
      SCRAPE_INTERVAL: "60"
      PORT: "9399"
    ports:
      - "9399:9399"
    networks: [monitor]

  # ── DevOps Chat — web UI for asking Claude Code optimization questions ───────
  devops-chat:
    build:
      context: ./services/devops-chat
      dockerfile: Dockerfile
    image: album-devops-chat:latest
    container_name: devops-chat
    restart: unless-stopped
    environment:
      PROMETHEUS_URL: "http://prometheus:9090"
      PORT: "8089"
    ports:
      - "8089:8089"
    networks: [monitor]

  # ── Analytics service — consumes album-metrics, publishes aggregations ──────
  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    image: album-analytics:latest
    container_name: analytics
    restart: unless-stopped
    depends_on: [kafka-init, kafka]
    environment:
      PORT: "8081"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CONSUMER_TOPIC: "album-metrics"
      KAFKA_PRODUCER_TOPIC: "album-analytics-output"
      CONSUMER_GROUP: "analytics-group"
    ports:
      - "8081:8081"
    networks: [monitor]

  # ── Alert service — evaluates per-instance thresholds, fires SNS/stdout ────
  alert:
    build:
      context: ./services/alert
      dockerfile: Dockerfile
    image: album-alert:latest
    container_name: alert
    restart: unless-stopped
    depends_on: [kafka-init, kafka]
    environment:
      PORT: "8082"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "album-metrics"
      CONSUMER_GROUP: "alert-group"
      SNS_TOPIC_ARN: "${SNS_TOPIC_ARN:-}"
      AWS_REGION: "${AWS_REGION:-us-west-2}"
      NOTIF_LIST: "/etc/alert/notifications.json"
      EC2_CLUSTER_NAME: "album-store-nodes"
    volumes:
      - ./notifications.json:/etc/alert/notifications.json:ro
    ports:
      - "8082:8082"
    networks: [monitor]

volumes:
  prometheus_data:
  grafana_data:
  kafka_data:

networks:
  monitor:
    driver: bridge
