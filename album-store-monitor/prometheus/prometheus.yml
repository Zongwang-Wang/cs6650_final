global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: album-store

scrape_configs:

  # ── Album Store nodes /metrics ────────────────────────────────────────────
  # Exposes application-level metrics: Redis cache hit/miss per operation,
  # seq INCR rate, upload durations, active semaphore slots, S3 errors.
  # Update targets with actual EC2 public IPs after terraform apply.
  - job_name: album_store
    static_configs:
      - targets:
          - "16.144.32.92:8080"
          - "34.209.16.149:8080"
          - "52.37.0.8:8080"
          - "34.217.34.11:8080"
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── Redis Exporter (ElastiCache) ──────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]
    relabel_configs:
      - target_label: instance
        replacement: elasticache

  # ── PostgreSQL Exporter (RDS) ─────────────────────────────────────────────
  - job_name: postgres
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ["postgres_exporter:9187"]
    relabel_configs:
      - target_label: instance
        replacement: rds

  # ── YACE CloudWatch Exporter (ALB, EC2, S3) ───────────────────────────────
  - job_name: cloudwatch
    static_configs:
      - targets: ["yace:5000"]
    metrics_path: /metrics

  # ── S3 Exporter (real-time object count + size) ─────────────────────────
  - job_name: s3_exporter
    static_configs:
      - targets: ["s3-exporter:9399"]
  # ── Analytics service ────────────────────────────────────────────────────
  - job_name: analytics
    static_configs:
      - targets: ["analytics:8081"]

  # ── Alert service ─────────────────────────────────────────────────────────
  - job_name: alert
    static_configs:
      - targets: ["alert:8082"]

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
