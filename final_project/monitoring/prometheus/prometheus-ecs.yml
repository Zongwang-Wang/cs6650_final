global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Cart API — scrape through the ALB (round-robins across tasks)
  - job_name: "cart-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["cs6650-final-alb-1284626161.us-west-2.elb.amazonaws.com:80"]
        labels:
          service: "cart-api"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
