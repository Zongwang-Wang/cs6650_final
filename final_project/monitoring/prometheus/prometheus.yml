global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "cart-api"
    static_configs:
      - targets: ["cart-api:8080"]
    metrics_path: /metrics

  - job_name: "analytics"
    static_configs:
      - targets: ["analytics:8081"]
    metrics_path: /metrics

  - job_name: "alert-service"
    static_configs:
      - targets: ["alert:8082"]
    metrics_path: /metrics

  - job_name: "ai-agent"
    static_configs:
      - targets: ["ai-agent:8083"]
    metrics_path: /metrics
